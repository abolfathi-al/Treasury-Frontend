<!DOCTYPE html>

<body id="velora_body" class="mat-typography">
  <vl-root>

      <img
        src="assets/media/logos/default-small.svg"
        width="198"
        height="178"
        alt="Velora loading"
        fetchpriority="high"
        loading="eager"/>
      <span>Loading Velora...</span>
    </div>
  </vl-root>
