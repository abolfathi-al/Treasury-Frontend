<div
  class="chart-donut d-flex flex-column flex-sm-row flex-wrap align-items-center gap-6"
  role="img"
  [attr.aria-label]="ariaLabel()"
>
  <div
    class="position-relative flex-shrink-0"
    [style.width.px]="size()"
    [style.height.px]="size()"
  >
    <div
      class="w-100 h-100"
      vlD3DonutChart
      [segments]="segments()"
      [size]="size()"
      [thickness]="thickness()"
      [gapAngle]="gapAngle()"
      [cornerRadius]="cornerRadius()"
      [ariaLabel]="ariaLabel()"
    ></div>

    <div
      class="position-absolute rounded-circle bg-body d-flex flex-column align-items-center justify-content-center"
      [style.inset.px]="thickness() + 2"
    >
      <div class="fs-2 fw-bold text-gray-900">{{ centerValue() }}</div>
      @if (centerLabel()) {
      <div class="fs-8 text-muted">{{ centerLabel() }}</div>
      }
    </div>
  </div>

  @if (showLegend()) {
  <div class="chart-donut__legend flex-grow-1 w-100 min-w-0">
    @for (segment of legendSegments(); track segment.label) {
    <div class="chart-donut__legend-row d-flex align-items-center justify-content-between gap-3 mb-3">
      <div class="chart-donut__legend-label d-flex align-items-center min-w-0">
        <span class="chart-donut__legend-marker bullet bullet-dot h-8px w-8px flex-shrink-0 me-3" [ngClass]="segment.colorClass"></span>
        <span class="fs-8 fw-semibold text-gray-800 text-truncate min-w-0">{{ segment.label }}</span>
      </div>
      <span class="chart-donut__legend-value fs-8 text-gray-700 text-nowrap">
        {{ segment.value }} ({{ segment.percent * 100 | number: '1.0-0' }}%)
      </span>
    </div>
    }
  </div>
  }
</div>
