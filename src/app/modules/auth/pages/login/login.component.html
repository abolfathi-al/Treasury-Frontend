<div class="d-flex flex-column gap-6 w-100">
  <div>
    <span class="badge badge-light-primary fw-semibold mb-4">
      {{ 'workspace.auth.login.secureSession' | translate }}
    </span>
    <h1
      class="text-dark fw-bolder mb-3"
      translate="workspace.auth.login.title">
    </h1>
    <p
      class="text-gray-600 mb-0"
      translate="workspace.auth.login.desc">
    </p>
  </div>

  @if (hasError()) {
    <div class="alert alert-danger mb-0" role="alert">
      <div
        class="alert-text fw-semibold"
        translate="workspace.auth.login.error">
      </div>
    </div>
  }

  @if (step() === 'credentials') {
    <form
      class="form w-100"
      [formGroup]="credentialsForm"
      (ngSubmit)="submitCredentials()"
      novalidate>
      <div class="d-flex flex-column gap-6">
        <div class="form-group">
          <label
            class="form-label required"
            for="login"
            translate="workspace.auth.input.login">
          </label>
          <input
            class="form-control bg-transparent"
            id="login"
            formControlName="login"
            autocomplete="username"
            [placeholder]="'workspace.auth.input.login' | translate"/>
          <vl-invalid-feedback
            control="login"
            name="workspace.auth.input.login">
          </vl-invalid-feedback>
        </div>

        <div class="form-group">
          <label
            class="form-label required"
            for="password"
            translate="workspace.auth.input.password">
          </label>
          <input
            class="form-control bg-transparent"
            id="password"
            type="password"
            formControlName="password"
            autocomplete="current-password"
            [placeholder]="'workspace.auth.input.password' | translate"/>
          <vl-invalid-feedback
            control="password"
            name="workspace.auth.input.password">
          </vl-invalid-feedback>
          <div
            class="form-text"
            translate="workspace.auth.login.passwordHint">
          </div>
        </div>

        <div class="d-flex flex-wrap align-items-center justify-content-between gap-4">
          <a
            routerLink="/auth/forgot-password"
            class="link-primary fw-semibold"
            translate="workspace.auth.login.recover">
          </a>
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="isSubmitting()"
            [attr.data-velora-indicator]="isSubmitting() ? 'on' : 'off'">
            <span
              class="indicator-label"
              translate="workspace.auth.login.button">
            </span>
            <span class="indicator-progress">
              {{ 'common.states.wait' | translate }}
              <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
            </span>
          </button>
        </div>
      </div>
    </form>
  } @else {
    <form
      class="form w-100"
      [formGroup]="totpForm"
      (ngSubmit)="submitTotp()"
      novalidate>
      <div class="d-flex flex-column gap-6">
        <div class="rounded bg-light-primary p-5">
          <div
            class="fw-bold text-primary mb-1"
            translate="workspace.auth.login.totpTitle">
          </div>
          <div class="text-gray-700">
            {{ 'workspace.auth.login.totpExpires' | translate: { value: challenge()?.expiresAt } }}
          </div>
        </div>

        <div class="form-group">
          <label
            class="form-label required"
            for="totp-code"
            translate="workspace.auth.input.totpCode">
          </label>
          <input
            class="form-control bg-transparent text-center fs-2 ls-3"
            id="totp-code"
            type="text"
            inputmode="numeric"
            maxlength="6"
            formControlName="code"
            autocomplete="one-time-code"
            [placeholder]="'workspace.auth.input.totpCode' | translate"/>
          <vl-invalid-feedback
            control="code"
            name="workspace.auth.input.totpCode">
          </vl-invalid-feedback>
        </div>

        <div class="d-flex justify-content-between gap-4">
          <button
            type="button"
            class="btn btn-light"
            [disabled]="isSubmitting()"
            (click)="restart()">
            <vl-velora-icon name="arrow-right" class="fs-4 me-2"></vl-velora-icon>
            {{ 'common.actions.back' | translate }}
          </button>
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="isSubmitting()"
            [attr.data-velora-indicator]="isSubmitting() ? 'on' : 'off'">
            <span
              class="indicator-label"
              translate="workspace.auth.login.verifyTotp">
            </span>
            <span class="indicator-progress">
              {{ 'common.states.wait' | translate }}
              <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
            </span>
          </button>
        </div>
      </div>
    </form>
  }
</div>
