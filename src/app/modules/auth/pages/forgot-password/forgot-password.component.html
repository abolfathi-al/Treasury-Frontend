<div class="d-flex flex-column gap-6 w-100">
  <div class="text-center">
    <h1
      class="text-dark fw-bolder mb-3"
      translate="workspace.auth.forgot.title">
    </h1>
    <p
      class="text-gray-600 mb-0"
      translate="workspace.auth.forgot.desc">
    </p>
  </div>

  @if (hasError()) {
    <div class="alert alert-danger mb-0" role="alert">
      <div
        class="alert-text fw-semibold"
        translate="workspace.auth.forgot.error">
      </div>
    </div>
  }

  @if (replacementRecoveryCode(); as replacementCode) {
    <div class="alert alert-success mb-0" role="status">
      <h2
        class="fs-5 fw-bold mb-3"
        translate="workspace.auth.forgot.success">
      </h2>
      <p
        class="mb-4"
        translate="workspace.auth.forgot.replacementWarning">
      </p>
      <code class="d-block user-select-all bg-white rounded p-4 text-dark">
        {{ replacementCode }}
      </code>
    </div>
    <a
      routerLink="/auth/login"
      class="btn btn-primary"
      translate="workspace.auth.forgot.returnToLogin">
    </a>
  } @else {
    <form
      class="form w-100"
      novalidate
      [formGroup]="form"
      (ngSubmit)="submit()">
      <div class="d-flex flex-column gap-5">
        <div class="form-group">
          <label
            class="form-label required"
            for="recovery-login"
            translate="workspace.auth.input.login">
          </label>
          <input
            class="form-control bg-transparent"
            id="recovery-login"
            formControlName="login"
            autocomplete="username"/>
          <vl-invalid-feedback
            control="login"
            name="workspace.auth.input.login">
          </vl-invalid-feedback>
        </div>

        <div class="form-group">
          <label
            class="form-label required"
            for="new-password"
            translate="workspace.auth.input.newPassword">
          </label>
          <input
            class="form-control bg-transparent"
            id="new-password"
            type="password"
            formControlName="newPassword"
            autocomplete="new-password"/>
          <vl-invalid-feedback
            control="newPassword"
            name="workspace.auth.input.newPassword">
          </vl-invalid-feedback>
        </div>

        <div class="form-group">
          <label
            class="form-label required"
            for="recovery-code"
            translate="workspace.auth.input.recoveryCode">
          </label>
          <input
            class="form-control bg-transparent"
            id="recovery-code"
            type="password"
            formControlName="recoveryCode"
            autocomplete="off"/>
          <vl-invalid-feedback
            control="recoveryCode"
            name="workspace.auth.input.recoveryCode">
          </vl-invalid-feedback>
        </div>

        <div class="form-group">
          <label
            class="form-label required"
            for="recovery-totp"
            translate="workspace.auth.input.totpCode">
          </label>
          <input
            class="form-control bg-transparent text-center fs-2 ls-3"
            id="recovery-totp"
            type="text"
            inputmode="numeric"
            maxlength="6"
            formControlName="totpCode"
            autocomplete="one-time-code"/>
          <vl-invalid-feedback
            control="totpCode"
            name="workspace.auth.input.totpCode">
          </vl-invalid-feedback>
        </div>

        <div class="d-flex flex-wrap justify-content-center gap-4">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="isSubmitting()"
            [attr.data-velora-indicator]="isSubmitting() ? 'on' : 'off'">
            <span
              class="indicator-label"
              translate="workspace.auth.forgot.submit">
            </span>
            <span class="indicator-progress">
              {{ 'common.states.wait' | translate }}
              <span class="spinner-border spinner-border-sm align-middle ms-2"></span>
            </span>
          </button>
          <a
            routerLink="/auth/login"
            class="btn btn-light"
            translate="common.actions.back">
          </a>
        </div>
      </div>
    </form>
  }
</div>
