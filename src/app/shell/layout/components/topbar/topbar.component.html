<!-- Search toolbar -->
<div
  class="d-flex align-items-center"
  [ngClass]="toolbarButtonMarginClass">
  <div
    class="btn btn-icon btn-active-light-primary position-relative"
    [ngClass]="toolbarButtonHeightClass"
    data-velora-menu-trigger="click"
    data-velora-menu-attach="parent"
    data-velora-menu-placement="bottom-end"
    data-velora-menu-flip="bottom">

    <vl-velora-icon name="magnifier" [ngClass]="toolbarButtonIconSizeClass"></vl-velora-icon>
  </div>
  @defer (on idle) {
    <vl-search-result-inner></vl-search-result-inner>
  }
</div>

<!-- Activities -->
<div
  class="d-flex align-items-center"
  [ngClass]="toolbarButtonMarginClass">
  <!-- begin::Drawer toggle -->
  <div
    class="btn btn-icon btn-active-light-primary"
    [ngClass]="toolbarButtonHeightClass"
    id="velora_drawer_chat_toggle">

    <vl-velora-icon name="chart-simple" [ngClass]="toolbarButtonIconSizeClass"></vl-velora-icon>
  </div>
  <!-- end::Drawer toggle -->
</div>

<!-- NOTIFICATIONS -->
<div
  class="d-flex align-items-center"
  [ngClass]="toolbarButtonMarginClass">

  <div
    class="btn btn-icon btn-active-light-primary position-relative"
    [ngClass]="toolbarButtonHeightClass"
    data-velora-menu-trigger="click"
    data-velora-menu-attach="parent"
    data-velora-menu-placement="bottom-end"
    data-velora-menu-flip="bottom">

    <vl-velora-icon name="element-plus" [ngClass]="toolbarButtonIconSizeClass"></vl-velora-icon>
  </div>
  @defer (on idle) {
    <vl-notifications-inner></vl-notifications-inner>
  }
</div>

<!-- CHAT -->
<div
  class="d-flex align-items-center"
  [ngClass]="toolbarButtonMarginClass">
  <!-- begin::Menu wrapper -->
  <div
    class="btn btn-icon btn-active-light-primary position-relative"
    [ngClass]="toolbarButtonHeightClass"
    id="velora_drawer_chat_toggle">
    <vl-velora-icon name="message-text-2" [ngClass]="toolbarButtonIconSizeClass"></vl-velora-icon>
    <span class="
      bullet bullet-dot
      bg-success
      h-6px
      w-6px
      position-absolute
      translate-middle
      top-0
      start-50
      animation-blink
    "></span>
  </div>
  <!-- end::Menu wrapper -->
</div>

<!-- Quick links -->
<div
  class="d-flex align-items-center"
  [ngClass]="toolbarButtonMarginClass">
  <div
    class="btn btn-icon btn-active-light-primary"
    [ngClass]="toolbarButtonHeightClass"
    data-velora-menu-trigger="click"
    data-velora-menu-attach="parent"
    data-velora-menu-placement="bottom-end"
    data-velora-menu-flip="bottom">
    <vl-velora-icon name="element-11" [ngClass]="toolbarButtonIconSizeClass"></vl-velora-icon>
  </div>
  @defer (on idle) {
    <vl-quick-links-inner></vl-quick-links-inner>
  }
</div>

<!-- begin::Theme mode -->
<vl-theme-mode-switcher
  class="d-flex align-items-center"
  [ngClass]="toolbarButtonMarginClass"
  [toggleBtnClass]="'btn-active-light-primary btn-custom ' + toolbarButtonHeightClass">
</vl-theme-mode-switcher>
<!-- end::Theme mode -->

<!-- begin::User -->
<div
  class="d-flex align-items-center"
  [ngClass]="toolbarButtonMarginClass"
  id="velora_header_user_menu_toggle">
  <!-- begin::Toggle -->
  <div
    class="cursor-pointer symbol"
    [ngClass]="toolbarUserAvatarHeightClass"
    data-velora-menu-trigger="click"
    data-velora-menu-attach="parent"
    data-velora-menu-placement="bottom-end"
    data-velora-menu-flip="bottom">
    <img src="./assets/media/avatars/40/40-1.webp" alt="Velora user" />
  </div>
  <!-- end::Toggle  -->
  @defer (on idle) {
    <vl-user-inner></vl-user-inner>
  }
</div>
<!-- end::User -->

@if (headerLeft() === 'menu') {
  <div class="d-flex align-items-center d-lg-none ms-2 me-n3" title="Show header menu">
    <div
      class="
        btn btn-icon btn-active-light-primary
        w-30px
        h-30px
        w-md-40px
        h-md-40px
      "
      id="velora_header_menu_mobile_toggle">
      <vl-velora-icon name="text-align-left" class="fs-1"></vl-velora-icon>
    </div>
  </div>
}
