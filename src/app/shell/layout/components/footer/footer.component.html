@if (appFooterContainerCSSClass()) {
<div class="container" [class]="appFooterContainerCSSClass()">
  <ng-container *ngTemplateOutlet="footerView"></ng-container>
</div>
} @else {
<ng-container *ngTemplateOutlet="footerView"></ng-container>
}

<ng-template #footerView>
  <footer
    class="d-flex flex-column flex-md-row flex-center flex-md-stack gap-4 py-3 text-gray-700"
    role="contentinfo"
    aria-label="Velora footer"
  >
    <div class="fw-semibold">
      &copy; {{ currentYear() }} Velora Enterprise
    </div>

    <nav class="menu menu-gray-600 menu-hover-primary fw-semibold">
      <a routerLink="/dashboard" class="menu-link px-2">{{ 'navigation.menu.dashboard' | translate }}</a>
    </nav>
  </footer>
</ng-template>
