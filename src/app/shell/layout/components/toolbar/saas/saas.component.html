<!--begin::Action wrapper-->
<div class="d-flex align-items-center">
  <!--begin::Label-->
  <span class="fs-7 fw-bold text-gray-700 pe-4 text-nowrap d-none d-md-block">
    {{'common.filters.sortBy' | translate}}:
  </span>
  <!--end::Label-->

  <!--begin::Select-->
  <select
    class="form-select form-select-sm form-select-solid w-100px w-xxl-125px"
    data-control="select2"
    [attr.data-placeholder]="'layout.toolbar.latest' | translate"
    data-hide-search="true">

    <option value=""></option>
    <option value="1" selected>{{ 'layout.toolbar.latest' | translate }}</option>
    <option value="2">{{ 'status.inProgress' | translate }}</option>
    <option value="3">{{ 'status.done' | translate }}</option>
  </select>
  <!--end::Select-->
</div>
<!--end::Action wrapper-->

<!--begin::Action wrapper-->
<div class="d-flex align-items-center">
  <!--begin::Separartor-->
  <div class="bullet bg-secondary h-35px w-1px mx-5"></div>
  <!--end::Separartor-->

  <!--begin::Label-->
  <span class="fs-7 text-gray-700 fw-bold">
    {{'common.labels.impactLevel' | translate}}:
  </span>
  <!--end::Label-->

  <!--begin::NoUiSlider-->
  <div class="d-flex align-items-center ps-4">
    <div id="velora_app_toolbar_slider" class="noUi-target noUi-target-success w-75px w-xxl-150px noUi-sm"></div>

    <span
      id="velora_app_toolbar_slider_value"
      class="d-flex flex-center bg-light-success rounded-circle w-35px h-35px ms-4 fs-7 fw-bold text-success"
      [ngbTooltip]="'layout.toolbar.setImpactLevel' | translate"
      placement="top">
    </span>
  </div>
  <!--end::NoUiSlider-->

  <!--begin::Separartor-->
  <div class="bullet bg-secondary h-35px w-1px mx-5"></div>
  <!--end::Separartor-->
</div>
<!--end::Action wrapper-->

<!--begin::Action wrapper-->
<div class="d-flex align-items-center">
  <!--begin::Label-->
  <span class="fs-7 text-gray-700 fw-bold pe-3 d-none d-md-block">
    {{'common.labels.quickTools' | translate}}:
  </span>
  <!--end::Label-->

  <!--begin::Actions-->
  <div class="d-flex">
    <!--begin::Action-->
    <button
      type="button"
      class="btn btn-sm btn-icon btn-icon-muted btn-active-icon-success"
      [ngbTooltip]="'layout.toolbar.addNewPage' | translate"
      placement="top"
      trigger="hover">
      <vl-velora-icon name="files" class="fs-2x"></vl-velora-icon>
    </button>
    <!--end::Action-->

    <!--begin::Action-->
    <button
      type="button"
      class="btn btn-sm btn-icon btn-icon-muted btn-active-icon-success"
      [ngbTooltip]="'layout.toolbar.addNewCategory' | translate"
      placement="top"
      trigger="hover">
      <vl-velora-icon name="add-files" class="fs-2x"></vl-velora-icon>
    </button>
    <!--end::Action-->

    <!--begin::Action-->
    <button
      type="button"
      class="btn btn-sm btn-icon btn-icon-muted btn-active-icon-success"
      [ngbTooltip]="'layout.toolbar.addNewSection' | translate"
      placement="top"
      trigger="hover">
      <vl-velora-icon name="search-list" class="fs-2x"></vl-velora-icon>
    </button>
    <!--end::Action-->
  </div>
  <!--end::Actions-->
</div>
<!--end::Action wrapper-->
