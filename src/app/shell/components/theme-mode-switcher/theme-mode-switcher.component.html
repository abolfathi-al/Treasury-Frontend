<!-- begin::Menu toggle -->
<button
  type="button"
  class="btn btn-icon"
  [ngClass]="toggleBtnClass()"
  [attr.data-velora-menu-trigger]="menuTrigger()"
  data-velora-menu-attach="parent"
  [attr.data-velora-menu-placement]="menuPlacement()"
  aria-haspopup="menu"
  aria-label="Theme mode"
  title="Theme mode"
>
  @if (mode$ | async; as mode) { @switch (mode) { @case ('dark') {
  <vl-velora-icon
    name="moon"
    class="fs-2 fs-lg-1 theme-light-hide"
    [ngClass]="toggleBtnIconClass()"
  >
  </vl-velora-icon>
  } @case ('light') {
  <vl-velora-icon
    name="night-day"
    class="fs-2 fs-lg-1 theme-dark-hide"
    [ngClass]="toggleBtnIconClass()"
  >
  </vl-velora-icon>
  } @case ('system') {
  <vl-velora-icon
    name="screen"
    class="fs-2 fs-lg-1"
    [ngClass]="toggleBtnIconClass()"
  >
  </vl-velora-icon>
  } } }
</button>
<!-- end::Menu toggle -->

<!-- begin::Menu -->
<div
  class="menu menu-sub menu-sub-dropdown menu-column menu-rounded menu-title-gray-700 menu-icon-muted menu-active-bg menu-state-primary fw-semibold py-4 fs-base w-175px"
  vlVeloraMenu
>
  @if (menuMode$ | async; as menuMode) {
  <!-- begin::Menu item  -->
  <div class="menu-item px-3 my-0">
    <button
      type="button"
      class="menu-link px-3 py-2 border-0 bg-transparent w-100 text-start"
      [class.active]="menuMode === 'light'"
      [attr.aria-pressed]="menuMode === 'light'"
      (click)="switchMode('light')"
    >
      <span class="menu-icon" data-velora-element="icon">
        <vl-velora-icon name="night-day" class="fs-3"></vl-velora-icon>
      </span>
      <span class="menu-title" translate="layout.theme.light"></span>
    </button>
  </div>
  <!-- end::Menu item -->

  <!-- begin::Menu item  -->
  <div class="menu-item px-3 my-0">
    <button
      type="button"
      class="menu-link px-3 py-2 border-0 bg-transparent w-100 text-start"
      [class.active]="menuMode === 'dark'"
      [attr.aria-pressed]="menuMode === 'dark'"
      (click)="switchMode('dark')"
    >
      <span class="menu-icon" data-velora-element="icon">
        <vl-velora-icon name="moon" class="fs-3"></vl-velora-icon>
      </span>
      <span class="menu-title" translate="layout.theme.dark"></span>
    </button>
  </div>
  <!-- end::Menu item -->

  <!-- begin::Menu item  -->
  <div class="menu-item px-3 my-0">
    <button
      type="button"
      class="menu-link px-3 py-2 border-0 bg-transparent w-100 text-start"
      [class.active]="menuMode === 'system'"
      [attr.aria-pressed]="menuMode === 'system'"
      (click)="switchMode('system')"
    >
      <span class="menu-icon" data-velora-element="icon">
        <vl-velora-icon name="screen" class="fs-3"></vl-velora-icon>
      </span>
      <span class="menu-title" translate="layout.theme.system"></span>
    </button>
  </div>
  <!-- end::Menu item -->
  }
</div>
<!-- end::Menu -->
