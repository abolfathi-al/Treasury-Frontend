<div
  id="velora_drawer_chat"
  class="bg-body"
  vlVeloraDrawer
  [drawerOverlay]="true"
  [drawerWidth]="{default:'300px', 'md': '500px'}"
  [drawerDirection]="'end'"
  [drawerName]="'chat'"
  [drawerActivate]="true"
  [drawerEscape]="true"
  [drawerToggleSelector]="'#velora_drawer_chat_toggle'"
  [drawerClose]="'#velora_drawer_chat_close'"
>
  <div class="card w-100 rounded-0" id="velora_drawer_chat_messenger">
    <div class="card-header pe-5" id="velora_drawer_chat_messenger_header">
      <div class="card-title">
        <div class="d-flex justify-content-center flex-column me-3">
          <a
            class="
              fs-4
              fw-bolder
              text-gray-900 text-hover-primary
              me-1
              mb-2
              lh-1
              cursor-pointer
            "
            routerLink="/"
            >Brian Cox</a
          >
          <div class="mb-0 lh-1">
            <span
              class="badge badge-success badge-circle w-10px h-10px me-1"
            ></span
            ><span class="fs-7 fw-bold text-gray-400">{{ 'layout.messenger.active' | translate }}</span>
          </div>
        </div>
      </div>
      <div class="card-toolbar">
        <div class="me-2">
          <button
            class="btn btn-sm btn-icon btn-active-light-primary"
            data-velora-menu-trigger="click"
            data-velora-menu-placement="bottom-end"
            data-velora-menu-flip="top-end"
            [attr.title]="'layout.messenger.toggleContactsMenu' | translate">
            <i class="bi bi-three-dots fs-3"></i>
          </button>
        </div>
        <div
          class="btn btn-sm btn-icon btn-active-light-primary"
          id="velora_drawer_chat_close"
        >
          <span class="svg-icon fs-2"></span>
          <vl-velora-icon name="cross" class="fs-2"></vl-velora-icon>
        </div>
      </div>
    </div>
  </div>
</div>
